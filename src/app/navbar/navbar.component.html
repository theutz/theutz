<header class="navbar">
  <nav class="container">
    <div class="brand">
      <a href="#" class="navbar-brand">Michael Utz</a>
      <button (click)="toggleNavbar($event)" class="navbar-toggler">
        <span id="navbar-toggler" class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div [collapse]="isCollapsed" class="navbar-collapse">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item" *ngFor="let item of links">
          <a class="nav-link" [href]="'#' + item.id">{{item.label}}</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
