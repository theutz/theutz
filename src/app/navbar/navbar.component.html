<header class="navbar">
  <nav class="container">
    <div class="brand">
      <a routerLink="/home" class="navbar-brand">Michael Utz</a>
      <button (click)="toggleNavbar($event)" class="navbar-toggler">
        <span id="navbar-toggler" class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div [collapse]="isCollapsed" class="navbar-collapse">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item" routerLinkActive="active" *ngFor="let link of links">
          <a class="nav-link" [routerLink]="link.route">{{link.title}}</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
